<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .headline { font-size: 54px; font-weight: 700; fill: #ffffff; }
      .sub      { font-size: 22px; font-weight: 400; fill: #9ECFDF; }
      .url      { font-size: 18px; font-weight: 600; fill: #F5F3EF; letter-spacing: 0.03em; }
      .tag      { font-size: 16px; font-weight: 400; fill: #9ECFDF; }
      .node-label { font-size: 13px; font-weight: 700; fill: #1B3A6B; text-transform: uppercase; letter-spacing: 0.06em; }
      .node-sub   { font-size: 11px; font-weight: 400; fill: #4B5568; }
      .stat-val   { font-size: 28px; font-weight: 700; fill: #155E78; }
      .stat-lbl   { font-size: 11px; font-weight: 600; fill: #718096; text-transform: uppercase; letter-spacing: 0.06em; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F2847"/>
      <stop offset="100%" stop-color="#1B3A6B"/>
    </linearGradient>
    <linearGradient id="card-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E6F3F8"/>
      <stop offset="100%" stop-color="#F5F3EF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#3BAACD"/>

  <!-- ── LEFT SIDE — Text ── -->
  <!-- Flags + arrow -->
  <text x="52" y="98" style="font-size:42px;">🇬🇧 → 🇺🇸</text>

  <!-- Site name -->
  <text class="headline" x="52" y="195">American Visa Guide</text>

  <!-- Tagline -->
  <text class="sub" x="52" y="243">Real data. Real community. London Embassy.</text>

  <!-- Divider -->
  <rect x="52" y="270" width="480" height="2" fill="#3BAACD" opacity="0.5"/>

  <!-- Description -->
  <text style="font-size:18px; fill:#C8DDE8; font-weight:400;" x="52" y="308">Community-sourced wait times and outcomes for</text>
  <text style="font-size:18px; fill:#C8DDE8; font-weight:400;" x="52" y="333">US family immigrant visas through the Embassy London.</text>

  <!-- Stats row -->
  <g transform="translate(52, 378)">
    <g>
      <text class="stat-val" y="0" fill="#3BAACD">200+</text>
      <text class="stat-lbl" y="20" fill="#7EB8CE">Members</text>
    </g>
    <g transform="translate(130, 0)">
      <text class="stat-val" y="0" fill="#3BAACD">~180</text>
      <text class="stat-lbl" y="20" fill="#7EB8CE">Days DQ→IL avg</text>
    </g>
    <g transform="translate(280, 0)">
      <text class="stat-val" y="0" fill="#3BAACD">94%</text>
      <text class="stat-lbl" y="20" fill="#7EB8CE">Approval rate</text>
    </g>
  </g>

  <!-- URL -->
  <text class="url" x="52" y="484">americanvisaguide.com</text>

  <!-- ── RIGHT SIDE — Pipeline diagram ── -->
  <!-- Card background -->
  <rect x="620" y="60" width="530" height="490" rx="16" fill="url(#card-top)" opacity="0.97"/>
  <rect x="620" y="60" width="530" height="490" rx="16" fill="none" stroke="#D6D2CA" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="620" y="60" width="530" height="54" rx="16" fill="#155E78"/>
  <rect x="620" y="96" width="530" height="18" fill="#155E78"/>
  <text x="885" y="93" style="font-size:14px; font-weight:700; fill:#fff; letter-spacing:0.06em; text-transform:uppercase; text-anchor:middle;">London Visa Pipeline</text>

  <!-- Stage 1: USCIS -->
  <g transform="translate(648, 132)">
    <rect x="0" y="0" width="474" height="88" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <!-- Icon circle -->
    <circle cx="36" cy="44" r="22" fill="#E6F3F8"/>
    <text x="36" y="50" style="font-size:18px; text-anchor:middle;">📋</text>
    <!-- Labels -->
    <text class="node-label" x="72" y="28">Step 1 — USCIS</text>
    <text style="font-size:16px; font-weight:600; fill:#1A2332;" x="72" y="50">I-130 Petition</text>
    <text class="node-sub" x="72" y="68">File with USCIS · Immediate Relative category</text>
    <!-- Status pill -->
    <rect x="350" y="30" width="110" height="22" rx="11" fill="#ECFDF6"/>
    <text style="font-size:11px; font-weight:700; fill:#0D7A5F; text-anchor:middle;" x="405" y="45">● ~8 months</text>
  </g>

  <!-- Connector 1→2 -->
  <g transform="translate(868, 222)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="#9ECFDF" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="-5,24 0,32 5,24" fill="#9ECFDF"/>
  </g>

  <!-- Stage 2: NVC -->
  <g transform="translate(648, 252)">
    <rect x="0" y="0" width="474" height="88" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="36" cy="44" r="22" fill="#E6F3F8"/>
    <text x="36" y="50" style="font-size:18px; text-anchor:middle;">📁</text>
    <text class="node-label" x="72" y="28">Step 2 — NVC</text>
    <text style="font-size:16px; font-weight:600; fill:#1A2332;" x="72" y="50">National Visa Centre</text>
    <text class="node-sub" x="72" y="68">Fees · Documents · DQ status</text>
    <rect x="350" y="30" width="110" height="22" rx="11" fill="#ECFDF6"/>
    <text style="font-size:11px; font-weight:700; fill:#0D7A5F; text-anchor:middle;" x="405" y="45">● ~3 months</text>
  </g>

  <!-- Connector 2→3 -->
  <g transform="translate(868, 342)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="#F6CC85" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="-5,24 0,32 5,24" fill="#F6CC85"/>
  </g>

  <!-- Stage 3: Embassy London -->
  <g transform="translate(648, 372)">
    <rect x="0" y="0" width="474" height="88" rx="10" fill="#FEF5E4" stroke="#F6CC85" stroke-width="1.5"/>
    <circle cx="36" cy="44" r="22" fill="#FEF5E4" stroke="#F6CC85" stroke-width="1"/>
    <text x="36" y="50" style="font-size:18px; text-anchor:middle;">🏛️</text>
    <text class="node-label" x="72" y="28" style="fill:#92400E;">Step 3 — Embassy London</text>
    <text style="font-size:16px; font-weight:600; fill:#1A2332;" x="72" y="50">IL Drop → Interview → Visa</text>
    <text class="node-sub" x="72" y="68">IL wait · Medical · Interview · Passport</text>
    <!-- Bottleneck badge -->
    <rect x="338" y="30" width="122" height="22" rx="11" fill="#FEF5E4" stroke="#F6CC85" stroke-width="1"/>
    <text style="font-size:11px; font-weight:700; fill:#A56D0E; text-anchor:middle;" x="399" y="45">⚡ Key bottleneck</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0D2235"/>
  <text x="52" y="611" style="font-size:14px; fill:#7EB8CE; font-weight:400;">Community resource · Not legal advice · Data from 200+ members</text>
  <text x="1150" y="611" style="font-size:14px; fill:#3BAACD; font-weight:700; text-anchor:end;">americanvisaguide.com</text>
</svg>
